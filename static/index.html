<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание задания</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <button onclick="location.href='admin.html'" class="back-btn" title="Вернуться к списку заданий">
                ←
            </button>
            <h1>Создание активности</h1>
        </div>
        
        <form id="taskForm" method="get">
            <label>Тип задания:</label>
            <br/>
            <input type="radio" id="auto_main" name="check_type" value="auto"/>
            <label for="auto_main">Автоматическая проверка</label>
            <br/>
            <input type="radio" id="manual_main" name="check_type" value="manual"/>
            <label for="manual_main">Ручная проверка</label>
            <br/>

            <label for="description">Описание технического задания:</label>
            <br/>
            <textarea name="description" id="description"></textarea>
            <br/>

            <label name="dd">Дедлайн:</label>
            <input type="datetime-local" name="dd" id="deadline"/>
            <br/>

    <!-- НОВЫЙ БЛОК: Посты для автоматической проверки -->
<div id="posts_block" style="display: none;">
    <label>Посты:</label>
    <div id="posts_container">
        <div class="post-row" id="post-row-0">
            <input type="url" class="post-input" placeholder="https://vk.com/wall...">
            <button type="button" class="add-post-btn" onclick="addPostRow()">+</button>
            <!-- Для первой строки кнопка удаления не добавляется -->
        </div>
    </div>
    <small class="hint">Введите ссылки на посты для проверки</small>
</div>

            <div id="auto_settings">
                <label>Формат автоматического задания:</label>
                <br/>
                <input type="radio" id="likes" name="auto_type" value="likes"/>
                <label for="likes">Лайки</label>
                <br/>
                <input type="radio" id="comments" name="auto_type" value="comments"/>
                <label for="comments">Комментарии</label>
            </div>

            <div id="format_block">
                <label name="auto">Выберите формат файла:</label>
                <select name="format" id="format">
                    <option>Выберите формат файла</option>
                    <option>PNG, JPG</option>
                    <option>MOV, MP3, MP4</option>
                    <option>DOC, DOCS, PDF, TXT</option>
                </select>
                <br/>
            </div>
            
            <div class="button-group">
                <input type="reset" value="Очистить" />
                <input type="submit" value="Создать задание" />
            </div>
        </form>
    </div>

    <script src="js/index.js"></script>
</body>
</html>
