<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Медиаконкурс</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .divider { text-align: center; color: rgba(255,255,255,0.5); margin: 15px 0; position: relative; }
        .divider::before, .divider::after { content: ""; position: absolute; top: 50%; width: 40%; height: 1px; background: rgba(255,255,255,0.2); }
        .divider::before { left: 0; } .divider::after { right: 0; }
        #VkIdSdkOneTap { width: 100%; max-width: 300px; margin: 0 auto 20px; }
    </style>
    <script src="https://unpkg.com/@vkid/sdk@latest/dist-sdk/umd/index.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="showAuthTab('login')">Вход</button>
            <button class="tab-btn" onclick="showAuthTab('register')">Регистрация</button>
        </div>

        <div id="login-tab" class="tab-content" style="display: block;">
            <div id="VkIdSdkOneTap"></div>
            
            <div class="divider">или по логину</div>

            <form id="loginForm">
                <label>Логин</label>
                <input type="text" id="login-username" required>
                <label>Пароль</label>
                <input type="password" id="login-password" required>
                <div style="text-align:right; margin-top:5px; margin-bottom:10px;">
                    <a href="#" onclick="openForgotPasswordModal(); return false;"
                       style="color:rgba(255,255,255,0.55); font-size:13px; text-decoration:none;"
                       onmouseover="this.style.color='rgba(255,255,255,0.9)'"
                       onmouseout="this.style.color='rgba(255,255,255,0.55)'">Забыли пароль?</a>
                </div>
                <div class="button-group">
                    <input type="submit" value="Войти" style="width: 100%; background-color: #4CAF50; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer;">
                </div>
                <div id="login-message" class="message"></div>
            </form>
        </div>

        <div id="register-tab" class="tab-content" style="display: none;">
            <form id="registerForm">
                <label>ФИО *</label><input type="text" id="reg-fullname" required>
                <label>Логин *</label><input type="text" id="reg-username" required>
                <label>Email *</label><input type="email" id="reg-email" required>
                <label>Пароль *</label><input type="password" id="reg-password" required>
                <label>Институт *</label>
                <select id="reg-institute">
                    <option value="ГИ">ГИ</option>
                    <option value="ИКНК">ИКНК</option>
                    <option value="ИПМЭиТ">ИПМЭиТ</option>
                    <option value="ИСИ">ИСИ</option>
                    <option value="ИБСиБ">ИБСиБ</option>
                    <option value="ИЭиТ">ИЭиТ</option>
                    <option value="Физмех">Физмех</option>
                    <option value="ИЭ">ИЭ</option>
                    <option value="ИММИТ">ИММИТ</option>
                    <option value="ИСПО">ИСПО</option>
                </select>
                <label>Ссылка VK *</label><input type="url" id="reg-vk" required>
                <label>Ссылка TG</label><input type="url" id="reg-tg">
                <div class="button-group">
                    <input type="submit" value="Зарегистрироваться">
                </div>
                <div id="register-message" class="message"></div>
            </form>
        </div>
    </div>
    <!-- Модальное окно восстановления пароля -->
    <div id="forgot-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.65); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:#1e3a22; border-radius:14px; padding:30px; width:340px; max-width:92%; position:relative; box-shadow:0 8px 32px rgba(0,0,0,0.55);">
            <button onclick="closeForgotPasswordModal()" style="position:absolute; top:10px; right:16px; background:none; border:none; color:rgba(255,255,255,0.6); font-size:24px; cursor:pointer; line-height:1;">&times;</button>

            <!-- Шаг 1: Подтверждение через VK -->
            <div id="reset-vk-section">
                <h3 style="color:white; margin:0 0 8px; font-size:17px;">Восстановление пароля</h3>
                <p style="color:rgba(255,255,255,0.65); font-size:13px; margin:0 0 20px; line-height:1.5;">
                    Подтвердите личность через ВКонтакте — система найдёт ваш аккаунт и позволит задать новый пароль.
                </p>
                <div id="VkIdSdkReset" style="width:100%; max-width:280px; margin:0 auto;"></div>
                <div id="reset-vk-error" style="color:#ff6b6b; font-size:13px; margin-top:12px; text-align:center; min-height:18px;"></div>
            </div>

            <!-- Шаг 2: Новый пароль (скрыт до авторизации через VK) -->
            <div id="reset-password-section" style="display:none;">
                <h3 style="color:white; margin:0 0 6px; font-size:17px;">Новый пароль</h3>
                <p id="reset-user-name" style="color:rgba(255,255,255,0.6); font-size:13px; margin:0 0 18px;"></p>
                <label style="color:rgba(255,255,255,0.8); font-size:13px; display:block; margin-bottom:5px;">Новый пароль</label>
                <input type="password" id="new-password" placeholder="Минимум 6 символов"
                    style="width:100%; padding:10px; border-radius:7px; border:none; background:rgba(255,255,255,0.12); color:white; font-size:14px; box-sizing:border-box; margin-bottom:12px; outline:none;">
                <label style="color:rgba(255,255,255,0.8); font-size:13px; display:block; margin-bottom:5px;">Повторите пароль</label>
                <input type="password" id="confirm-password" placeholder="Повторите пароль"
                    style="width:100%; padding:10px; border-radius:7px; border:none; background:rgba(255,255,255,0.12); color:white; font-size:14px; box-sizing:border-box; margin-bottom:18px; outline:none;">
                <button onclick="submitNewPassword()"
                    style="width:100%; padding:12px; background:#4CAF50; border:none; color:white; border-radius:7px; font-size:15px; font-weight:600; cursor:pointer;">
                    Сохранить пароль
                </button>
                <div id="reset-password-msg" style="font-size:13px; margin-top:10px; text-align:center; min-height:18px;"></div>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
